<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="common-styles.css">
    <link rel="stylesheet" href="index.css">
    <title>My Wallet: Personal Finance Tracker - Home</title>
</head>
<body>
    <div class="page-wrapper">
        <div class="side-bar">
            <h1>My Wallet</h1>
            <ul>
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="services/transaction.html">Add Transaction</a></li>
                <li><a href="services/view-transaction.html">View Transactions</a></li>
                <li><a href="services/budget.html">Create Budget</a></li>
                <li><a href="services/view-budget.html">View Budget / Limits</a></li>
                <li><a href="services/new-savings-plan.html">Create New Savings Plan</a></li>
                <li><a href="services/view-savings-plan.html">View Savings Plan</a></li>
                <li><a href="services/monthly-report.html">Request Monthly Report</a></li>
            </ul>
        </div>
        <div class="content-body">
            <div class="header">
                <h1>Personal Finance Tracker</h1>
            </div>
            <div class="services-bar">
                <div class="card">
                    <span class="card-label" >Balance </span>
                    <span class="card-value" id="balance"></span>
                    <div id="balance-spinner" class="spinner"></div>
                </div>
                <div class="card">
                    <span class="card-label">Total Income </span>
                    <span class="card-value" id="total-income"></span>
                    <div id="income-spinner" class="spinner"></div>
                </div>
                <div class="card">
                    <span class="card-label">Total Expenses </span>
                    <span class="card-value" id="total-expenses"></span>
                    <div id="expenses-spinner" class="spinner"></div>
                </div>
                <!-- <div class="card"></div>
                <div class="card"></div>

                <div class="card"></div> -->
