<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../common-styles.css">
    <link rel="stylesheet" href="form-styles.css">
    <title>My Wallet - Add Transactions</title>
</head>
<body>
    <div class="page-wrapper">
        <div class="side-bar">
            <h1>My Wallet</h1>
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="transaction.html" class="active">Add Transaction</a></li>
                <li><a href="view-transaction.html">View Transactions</a></li>
                <li><a href="budget.html">Create Budget</a></li>
                <li><a href="view-budget.html">View Budget / Limits</a></li>
                <li><a href="new-savings-plan.html">Create New Savings Plan</a></li>
                <li><a href="view-savings-plan.html">View Savings Plan</a></li>
                <li><a href="monthly-report.html">Request Monthly Report</a></li>
            </ul>
        </div>
        <div class="content-body">
            <h1>Add Transaction</h1>
            <form id="transaction-form">
                <label for="amount">Amount (₦)</label>
                <input type="number" id="amount" name="amount" step="0.01" required>

                <label for="type">Type</label>
                <select id="type" name="type" required>
                    <option value="Income">Income</option>
                    <option value="Expense">Expense</option>
                </select>

                <label for="category">Category</label>
                <input type="text" id="category" name="category" required>

                <label for="note">Note (optional)</label>
                <input type="text" id="note" name="note">

                <button type="submit" id="submit-btn">
                    <span id="submit-text">Add Transaction</span>
                    <div class="spinner" id="submit-spinner" style="display: none;"></div>
                </button>
            </form>
            <div id="status-message"></div>
        </div>
    </div>
    <script src="add-transaction.js"></script>
</body>
</html>
