<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../common-styles.css">
    <link rel="stylesheet" href="form-styles.css">
    <title>New Budget</title>
</head>
<body>
    <div class="page-wrapper">
        <div class="side-bar">
            <h1>My Wallet</h1>
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="transaction.html">Add Transaction</a></li>
                <li><a href="view-transaction.html">View Transactions</a></li>
                <li><a href="budget.html" class="active">Create Budget</a></li>
                <li><a href="view-budget.html">View Budget / Limits</a></li>
                <li><a href="new-savings-plan.html">Create New Savings Plan</a></li>
                <li><a href="view-savings-plan.html">View Savings Plan</a></li>
                <li><a href="monthly-report.html">Request Monthly Report</a></li>
            </ul>
        </div>
        <div class="content-body">
            <h1>Create New Budget / Set your Limits for the month</h1>
            <form id="transaction-form">
                <label for="budget">Total Budget (₦)</label>
                <input type="number" id="budget_amount_field" name="budget" step="0.01" required>
                
                <label for="feeding">Feeding (₦)</label>
                <input type="number" id="feeding_amount_field" name="feeding" required>

                <label for="airtime_data">Airtime / Data (₦)</label>
                <input type="number" id="airtime_amount_field" name="airtime_data" required>

                <label for="electricity">Electricity (₦)</label>
                <input type="number" id="electricity_amount_field" name="electricity" required>

                <label for="betting">Betting (₦)</label>
                <input type="number" id="betting_amount_field" name="betting" required>

                <label for="transfer">Transfer (₦)</label>
                <input type="number" id="transfer_amount_field" name="transfer" required>

                <button type="submit" id="submit-btn">
                    <span id="submit-text">Create Budget</span>
                    <div class="spinner" id="submit-spinner" style="display: none;"></div>
                </button>
            </form>
            <div id="status-message"></div>
        </div>
    </div>
    <script src="budget.js"></script>
</body>
</html>
